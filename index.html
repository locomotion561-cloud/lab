<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denge Labirenti Oyunu</title>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        #unity-container { width: 100%; height: 100%; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10;
        }
        button {
            padding: 20px 40px; font-size: 20px; cursor: pointer;
            background: #28a745; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="unity-container">
        <canvas id="unity-canvas"></canvas>
        
        <div id="overlay">
            <h1>Denge Labirenti</h1>
            <p>Başlamak için butona tıklayın ve sensör izni verin.</p>
            <button id="start-button">OYUNU BAŞLAT</button>
        </div>
    </div>

    <script>
        const startButton = document.getElementById("start-button");
        const overlay = document.getElementById("overlay");

        startButton.addEventListener("click", () => {
            // Jiroskop/İvmeölçer izni isteme (iOS için kritik)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            console.log("Sensör izni verildi.");
                            overlay.style.display = 'none';
                            // Buraya Unity'yi başlatan fonksiyonu ekleyebilirsiniz (UnityLoader...)
                        }
                    })
                    .catch(console.error);
            } else {
                // Android ve diğer tarayıcılar için
                overlay.style.display = 'none';
            }
        });
    </script>
</body>
</html>
