<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Denge Labirenti</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { background: #fff; border: 5px solid #333; touch-action: none; }
        #startBtn { padding: 15px 30px; font-size: 18px; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<button id="startBtn">Oyunu Başlat (Jiroskopu Etkinleştir)</button>
<canvas id="gameCanvas"></canvas>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    const canvas = document.getElementById('gameCanvas');
    const engine = Engine.create();
    const render = Render.create({
        element: document.body,
        canvas: canvas,
        engine: engine,
        options: { width: 500, height: 500, wireframes: false, background: '#fff' }
    });

    // 1. Labirent ve Bilye (Görsele uygun 500x500 birim)
    const ball = Bodies.circle(30, 30, 10, { render: { fillStyle: 'red' } });
    const exit = Bodies.rectangle(470, 470, 40, 40, { isStatic: true, isSensor: true, render: { fillStyle: 'green' } });

    // Labirent Duvarları (Basitleştirilmiş Izgara Mantığı)
    const walls = [
        Bodies.rectangle(250, 0, 500, 10, { isStatic: true }),
        Bodies.rectangle(250, 500, 500, 10, { isStatic: true }),
        Bodies.rectangle(0, 250, 10, 500, { isStatic: true }),
        Bodies.rectangle(500, 250, 10, 500, { isStatic: true }),
        // İç labirent çizgileri
        Bodies.rectangle(100, 100, 200, 10, { isStatic: true }),
        Bodies.rectangle(300, 150, 10, 200, { isStatic: true }),
        Bodies.rectangle(200, 300, 200, 10, { isStatic: true }),
        Bodies.rectangle(100, 400, 10, 200, { isStatic: true }),
        Bodies.rectangle(400, 300, 10, 200, { isStatic: true })
    ];

    Composite.add(engine.world, [ball, exit, ...walls]);

    // 2. Jiroskop Kontrolü
    document.getElementById('startBtn').addEventListener('click', () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(response => {
                if (response === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            });
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
        document.getElementById('startBtn').style.display = 'none';
    });

    function handleOrientation(event) {
        // beta: öne-arkaya eğim, gamma: sağa-sola eğim
        engine.world.gravity.x = event.gamma / 30; 
        engine.world.gravity.y = event.beta / 30;
    }

    // 3. Çarpışma ve Kazanma
    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(pair => {
            if (pair.bodyA === ball || pair.bodyB === ball) {
                if (pair.bodyA === exit || pair.bodyB === exit) {
                    alert("Tebrikler!");
                    location.reload();
                }
            }
        });
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);
</script>
</body>
</html>
